<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Phase0 Guest</title>
    <style>
      body { font-family: sans-serif; margin: 24px; }
      #box { width: 80px; height: 80px; background: #7c3aed; position: relative; animation: move 1s infinite alternate linear; }
      @keyframes move { from { left: 0; } to { left: 260px; } }
    </style>
  </head>
  <body>
    <button id="increment" aria-label="Increment count">Count: <span id="count">0</span></button>
    <label>Message <input id="message" aria-label="Message" /></label>
    <button id="replace" aria-label="Replace controls">Replace controls</button>
    <div id="shadow-host"></div>
    <iframe id="same-origin-frame" title="Same origin frame" srcdoc='<button aria-label="Frame action">Frame action</button>'></iframe>
    <div id="timer">0</div>
    <div id="box"></div>
    <script>
      let count = 0;
      let ticks = 0;
      document.querySelector("#increment").addEventListener("click", () => {
        count += 1;
        document.querySelector("#count").textContent = String(count);
      });
      document.querySelector("#replace").addEventListener("click", () => {
        const input = document.querySelector("#message");
        const replacement = input.cloneNode();
        replacement.value = input.value;
        input.replaceWith(replacement);
      });
      const shadowRoot = document.querySelector("#shadow-host").attachShadow({ mode: "open" });
      shadowRoot.innerHTML = '<button aria-label="Shadow action">Shadow action</button>';
      setInterval(() => {
        ticks += 1;
        document.querySelector("#timer").textContent = String(ticks);
      }, 100);
    </script>
  </body>
</html>
